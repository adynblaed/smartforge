# Argo CD GitOps app (scaffold) — deploys the SmartForge Helm chart per site.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smartforge
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://example.com/your-org/smartforge.git
    targetRevision: main
    path: infra/helm/smartforge
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: smartforge
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
