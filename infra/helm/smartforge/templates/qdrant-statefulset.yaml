{{- if .Values.qdrant.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "smartforge.fullname" . }}-qdrant
  labels:
    {{- include "smartforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  clusterIP: None
  ports:
    - name: http
      port: 6333
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 6334
      targetPort: grpc
      protocol: TCP
  selector:
    {{- include "smartforge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "smartforge.fullname" . }}-qdrant
  labels:
    {{- include "smartforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  serviceName: {{ include "smartforge.fullname" . }}-qdrant
  replicas: 1
  selector:
    matchLabels:
      {{- include "smartforge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        {{- include "smartforge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: qdrant
    spec:
      serviceAccountName: {{ include "smartforge.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        # The official qdrant image works as an arbitrary non-root uid as long
        # as fsGroup grants write on /qdrant/storage.
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: qdrant
          image: "{{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}"
          imagePullPolicy: {{ .Values.qdrant.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 6333
              protocol: TCP
            - name: grpc
              containerPort: 6334
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: qdrant-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.qdrant.storage.className }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.qdrant.storage.size }}
{{- end }}
