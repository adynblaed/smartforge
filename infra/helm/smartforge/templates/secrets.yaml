{{- /*
=============================================================================
DEV-ONLY inline Secrets.

The supported path for staging/production is an EXISTING Secret per domain
(provisioned via kubectl, External Secrets Operator, or Vault Agent Injector —
see infra/vault/ and infra/helm/README.md), referenced through:

  secrets.app.existingSecret        SECRET_KEY, FIRST_SUPERUSER_PASSWORD,
                                    SANDBOX_USER_PASSWORD, SMTP_PASSWORD?,
                                    FIIX_API_KEY?, QDRANT_API_KEY?,
                                    METRICS_BEARER_TOKEN?
  postgres.existingSecret           POSTGRES_PASSWORD
  warehouse.existingSecret          WAREHOUSE_LOADER_PASSWORD,
                                    WAREHOUSE_DBT_PASSWORD, WAREHOUSE_API_PASSWORD
  oracle.existingSecret             OMEGA_ORACLE_PASSWORD
  secrets.anthropic.existingSecret  ANTHROPIC_API_KEY?

When an existingSecret name is empty AND secrets.allowInlineDev=true, the
chart renders the Secret below from the corresponding `inline:` map so a dev
cluster can run without out-of-band provisioning. Rendering fails fast when
allowInlineDev=false (the staging/production overlays) and a name is missing.

WARNING: inline values end up in your values files and in the Helm release —
never commit real credentials this way.

These Secrets are annotated as pre-install/pre-upgrade hooks so they exist
BEFORE the prestart migration Job (also a pre-* hook) runs; regular workloads
reference them by name afterwards. before-hook-creation recreates them on each
upgrade. Hook resources are not deleted by `helm uninstall` — clean up with
`kubectl delete secret -l app.kubernetes.io/instance=<release>`.
=============================================================================
*/ -}}
{{- $ctx := . -}}
{{- $domains := list
      (dict "suffix" "app"       "existing" .Values.secrets.app.existingSecret       "inline" .Values.secrets.app.inline       "key" "secrets.app.existingSecret")
      (dict "suffix" "postgres"  "existing" .Values.postgres.existingSecret          "inline" .Values.postgres.inline          "key" "postgres.existingSecret")
      (dict "suffix" "warehouse" "existing" .Values.warehouse.existingSecret         "inline" .Values.warehouse.inline         "key" "warehouse.existingSecret")
      (dict "suffix" "oracle"    "existing" .Values.oracle.existingSecret            "inline" .Values.oracle.inline            "key" "oracle.existingSecret")
      (dict "suffix" "anthropic" "existing" .Values.secrets.anthropic.existingSecret "inline" .Values.secrets.anthropic.inline "key" "secrets.anthropic.existingSecret")
-}}
{{- range $d := $domains }}
{{- if not $d.existing }}
{{- if not $ctx.Values.secrets.allowInlineDev }}
{{- fail (printf "%s must be set when secrets.allowInlineDev=false" $d.key) }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "smartforge.fullname" $ctx }}-{{ $d.suffix }}
  labels:
    {{- include "smartforge.labels" $ctx | nindent 4 }}
    app.kubernetes.io/component: secrets
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
{{- with $d.inline }}
stringData:
  {{- range $k, $v := . }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
