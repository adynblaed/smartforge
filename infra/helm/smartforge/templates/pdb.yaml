{{- if .Values.backend.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "smartforge.fullname" . }}-backend
  labels:
    {{- include "smartforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  minAvailable: {{ .Values.backend.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "smartforge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
{{- end }}
{{- if .Values.frontend.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "smartforge.fullname" . }}-frontend
  labels:
    {{- include "smartforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  minAvailable: {{ .Values.frontend.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "smartforge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
{{- end }}
