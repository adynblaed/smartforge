{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "smartforge.serviceAccountName" . }}
  labels:
    {{- include "smartforge.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# No SmartForge workload talks to the Kubernetes API; pods also set
# automountServiceAccountToken: false.
automountServiceAccountToken: false
{{- end }}
