services:

  db:
    image: postgres:18
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}

  adminer:
    image: adminer
    restart: always
    networks:
      - traefik-public
      - default
    depends_on:
      - db
    environment:
      - ADMINER_DESIGN=pepa-linha-dark
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-http.rule=Host(`adminer.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-http.middlewares=https-redirect
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.rule=Host(`adminer.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-adminer-https.tls.certresolver=le
      - traefik.http.services.${STACK_NAME?Variable not set}-adminer.loadbalancer.server.port=8080

  prestart:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    build:
      context: .
      dockerfile: backend/Dockerfile
    networks:
      - traefik-public
      - default
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: bash scripts/prestart.sh
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN}

  backend:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    restart: always
    # Drain in-flight requests on deploy/scale-down before SIGKILL.
    stop_grace_period: 30s
    networks:
      - traefik-public
      - default
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN}
      - REDIS_HOST=redis
      # The dedicated `worker` service runs the telemetry simulator.
      - SIMULATOR_ENABLED=false
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      # Data platform (read-only consumers: warehouse api role + DuckDB read_only)
      - PLATFORM_ENV=${PLATFORM_ENV:-development}
      - WAREHOUSE_DB=${WAREHOUSE_DB:-warehouse}
      - WAREHOUSE_API_USER=${WAREHOUSE_API_USER:-warehouse_api_reader}
      - WAREHOUSE_API_PASSWORD=${WAREHOUSE_API_PASSWORD:-}
      - LAKE_ROOT=/srv/data/lake
      - DUCKDB_PATH=/srv/data/catalog/smartforge_lake.duckdb
    volumes:
      - app-lake-data:/srv/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5

    build:
      context: .
      dockerfile: backend/Dockerfile
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public

      - traefik.http.services.${STACK_NAME?Variable not set}-backend.loadbalancer.server.port=8000

      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.entrypoints=http

      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls.certresolver=le

      # Ingress guardrails (SEC-012/SEC-013): per-client rate limiting so one
      # analytical consumer cannot exhaust API workers or database pools, and
      # baseline security headers at the proxy.
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-ratelimit.ratelimit.average=${API_RATE_LIMIT_AVERAGE:-100}
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-ratelimit.ratelimit.burst=${API_RATE_LIMIT_BURST:-200}
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-secure-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-secure-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-secure-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-secure-headers.headers.frameDeny=true
      - traefik.http.middlewares.${STACK_NAME?Variable not set}-secure-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.middlewares=${STACK_NAME?Variable not set}-ratelimit,${STACK_NAME?Variable not set}-secure-headers

      # Enable redirection for HTTP and HTTPS
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.middlewares=https-redirect

  frontend:
    image: '${DOCKER_IMAGE_FRONTEND?Variable not set}:${TAG-latest}'
    restart: always
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traefik-public
      - default
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=https://api.${DOMAIN?Variable not set}
        - NODE_ENV=production
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public

      - traefik.http.services.${STACK_NAME?Variable not set}-frontend.loadbalancer.server.port=80

      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.rule=Host(`dashboard.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.entrypoints=http

      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.rule=Host(`dashboard.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.tls.certresolver=le
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.middlewares=${STACK_NAME?Variable not set}-secure-headers

      # Enable redirection for HTTP and HTTPS
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.middlewares=https-redirect

  # ---- SmartForge services ----
  redis:
    image: redis:8-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - app-redis-data:/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    volumes:
      - app-qdrant-data:/qdrant/storage

  worker:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    restart: always
    # Single canonical telemetry simulator — do NOT scale (would double-write).
    stop_grace_period: 30s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    command: python -m app.workers.telemetry_simulator
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - REDIS_HOST=redis
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}

  platform-worker:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    restart: always
    # Single writer for the Parquet lake + DuckDB catalog — do NOT scale
    # (DuckDB single-writer, DDB-002; single-flight enforced via advisory lock).
    stop_grace_period: 60s
    depends_on:
      db:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    command: python -m app.dataplatform.scheduler
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - PLATFORM_ENV=${PLATFORM_ENV:-development}
      - WAREHOUSE_DB=${WAREHOUSE_DB:-warehouse}
      - WAREHOUSE_LOADER_USER=${WAREHOUSE_LOADER_USER:-warehouse_loader}
      - WAREHOUSE_LOADER_PASSWORD=${WAREHOUSE_LOADER_PASSWORD:-}
      - WAREHOUSE_DBT_USER=${WAREHOUSE_DBT_USER:-warehouse_transformer}
      - WAREHOUSE_DBT_PASSWORD=${WAREHOUSE_DBT_PASSWORD:-}
      - WAREHOUSE_API_USER=${WAREHOUSE_API_USER:-warehouse_api_reader}
      - WAREHOUSE_API_PASSWORD=${WAREHOUSE_API_PASSWORD:-}
      - OMEGA_ORACLE_USER=${OMEGA_ORACLE_USER:-omega_analytics_reader}
      - OMEGA_ORACLE_PASSWORD=${OMEGA_ORACLE_PASSWORD:-}
      - OMEGA_ORACLE_HOST=${OMEGA_ORACLE_HOST:-}
      - OMEGA_ORACLE_PORT=${OMEGA_ORACLE_PORT:-1521}
      - OMEGA_ORACLE_SERVICE_NAME=${OMEGA_ORACLE_SERVICE_NAME:-}
      - OMEGA_ORACLE_SID=${OMEGA_ORACLE_SID:-}
      - LAKE_ROOT=/srv/data/lake
      - DUCKDB_PATH=/srv/data/catalog/smartforge_lake.duckdb
    volumes:
      - app-lake-data:/srv/data

  db-backup:
    # Scheduled logical backups of the transactional DB and the analytics
    # warehouse (PG-009/DR-002). Restore procedure: runbooks/backup_restore.md.
    # Production should ALSO enable WAL archiving / PITR on the Postgres host
    # or use a managed database service; this sidecar is the portable baseline.
    image: prodrigestivill/postgres-backup-local:18
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app-db-backups:/backups
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      # Both logical databases: application + analytics warehouse
      - POSTGRES_DB=${POSTGRES_DB?Variable not set},${WAREHOUSE_DB:-warehouse}
      - SCHEDULE=${BACKUP_SCHEDULE:-@daily}
      - BACKUP_KEEP_DAYS=${BACKUP_KEEP_DAYS:-7}
      - BACKUP_KEEP_WEEKS=${BACKUP_KEEP_WEEKS:-4}
      - BACKUP_KEEP_MONTHS=${BACKUP_KEEP_MONTHS:-6}
      - HEALTHCHECK_PORT=8080

  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - app-prometheus-data:/prometheus
    # Loopback-only: observe locally; never expose metrics to the network.
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD?Variable not set}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - app-grafana-data:/var/lib/grafana
    # Loopback-only: the dashboards UI is not exposed to the network.
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus

volumes:
  app-db-data:
  app-redis-data:
  app-qdrant-data:
  app-prometheus-data:
  app-grafana-data:
  # Canonical Parquet lake + DuckDB catalog (written only by platform-worker)
  app-lake-data:
  # Rotated pg_dump archives (db-backup service) — see runbooks/backup_restore.md
  app-db-backups:

networks:
  traefik-public:
    # Allow setting it to false for testing
    external: true
