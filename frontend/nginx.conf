# ---- Hardening (http context; this file is included under http{}) -----------
server_tokens off;

# Rate-limit zones keyed by client IP. `api` is generous for normal use; `login`
# is strict to blunt credential brute-force.
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_status 429;
limit_conn_zone $binary_remote_addr zone=conns:10m;

gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_types text/plain text/css application/javascript application/json
           image/svg+xml application/xml font/woff2;

server {
  listen 80;
  server_name _;

  # Docker's embedded DNS — resolve the `backend` service at request time (via a
  # variable upstream) so nginx starts even if backend is briefly unavailable,
  # and load-balances across replicas when the backend is scaled (HA).
  resolver 127.0.0.11 ipv6=off valid=10s;

  # Cap request bodies (datasource CSV import is the largest legitimate upload).
  client_max_body_size 25m;
  limit_conn conns 100;

  # ---- Security headers (server-wide default) -------------------------------
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-XSS-Protection "0" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
  # HSTS — meaningful once served over HTTPS (harmless over plain HTTP).
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

  # ---- Same-origin API proxy ------------------------------------------------
  # The SPA calls the API at a RELATIVE path (/api/v1/...), so the browser only
  # ever talks to this origin. nginx forwards it to the backend over the Docker
  # network — eliminating CORS and localhost/IPv6 reachability problems.

  # WebSocket streams (telemetry / orders) need the upgrade handshake.
  location /api/v1/ws/ {
    set $api http://backend:8000;
    proxy_pass $api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # Authentication endpoints — strict rate limit (brute-force protection).
  location ~ ^/api/v1/(login|password-recovery|reset-password) {
    set $api http://backend:8000;
    limit_req zone=login burst=5 nodelay;
    proxy_pass $api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # REST API.
  location /api/ {
    set $api http://backend:8000;
    limit_req zone=api burst=60 nodelay;
    proxy_pass $api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  # Interactive API docs (same-origin). Disabled by the backend in production
  # (returns 404); kept proxied for local/staging debugging.
  location = /docs    { set $api http://backend:8000; proxy_pass $api; proxy_set_header Host $host; }
  location = /redoc   { set $api http://backend:8000; proxy_pass $api; proxy_set_header Host $host; }
  location = /openapi.json { set $api http://backend:8000; proxy_pass $api; proxy_set_header Host $host; }

  # ---- Static assets (immutable, content-hashed) ----------------------------
  location /assets/ {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # ---- SPA ------------------------------------------------------------------
  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    # Never hard-cache the app shell so a fresh deploy / favicon always applies.
    add_header Cache-Control "no-cache" always;
    # Re-declare security headers (a location's own add_header drops inherited ones).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    try_files $uri /index.html =404;
  }
}
