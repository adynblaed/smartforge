version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    labels:
      - "internal"
      - "dependencies"
      - "github_actions"
    groups:
      github-actions:
        patterns:
          - "*"
  # Python uv
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    labels: [dependencies, internal]
    ignore:
      # LTS baseline: majors are reviewed manually, not auto-grouped.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      python-packages:
        patterns:
          - "*"
  # bun
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    labels: [dependencies, internal]
    ignore:
      - dependency-name: "@hey-api/openapi-ts"
      # The linter is pinned exactly (new rule sets = new findings); bump it
      # deliberately together with a lint sweep, never via grouped updates.
      - dependency-name: "@biomejs/biome"
      # LTS baseline: majors are reviewed manually, not auto-grouped.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      npm-packages:
        patterns:
          - "*"
  # Docker
  - package-ecosystem: docker
    directories:
      - /backend
      - /frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    labels: [dependencies, internal, docker]
    groups:
      docker:
        patterns:
          - "*"
  # Docker Compose
  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    labels: [dependencies, internal, docker_compose]
    groups:
      docker-compose:
        patterns:
          - "*"
  # pre-commit
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    labels:
      - "internal"
      - "dependencies"
      - "pre-commit"
    groups:
      pre-commit:
        patterns:
          - "*"
