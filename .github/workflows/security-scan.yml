name: Security - Scans

# Recurring security testing (SEC-008, SEC-016, CICD-005): secret scanning,
# dependency vulnerability audit over both lockfiles, and a scheduled weekly
# sweep so drift is caught between releases. Scanners run from pinned-tag
# container images rather than third-party actions to keep the workflow
# supply-chain surface minimal (SEC-014).

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
  schedule:
    # Weekly sweep, Monday 06:00 UTC (OPS-011 routine maintenance)
    - cron: "0 6 * * 1"

permissions: {}

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history for commit scanning)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Gitleaks secret scan
        run: >-
          docker run --rm -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.24.3
          detect --source /repo --redact --exit-code 1 --verbose

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.18"
      - name: Audit Python dependencies (pip-audit over uv.lock export)
        run: |
          uv export --frozen --no-emit-project --format requirements-txt > /tmp/requirements.txt
          uvx pip-audit --strict --requirement /tmp/requirements.txt
        working-directory: backend
      - name: Audit JS dependencies (osv-scanner over bun.lock)
        run: >-
          docker run --rm -v "$PWD:/repo"
          ghcr.io/google/osv-scanner:v2.0.2
          scan --lockfile /repo/bun.lock
