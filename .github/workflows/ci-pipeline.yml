name: CI - Pipeline Confidence

# The formal offline verification pipeline for SmartForge v1.0.0
# (CICD-003/004/011). Zero external databases or services: the 572-test
# matrix is fully self-contained — tests_dataplatform mocks the Oracle
# boundary and uses real DuckDB/PyArrow in temp dirs; tests_smartforge runs
# on in-memory SQLite; frontend unit tests run in jsdom. Every job feeds
# the single `pipeline-confidence` gate, which is the ONE required status
# check for branch protection.
#
# Complementary workflows (deliberately separate; naming convention:
# ci-* verification · cd-* deploys · security-* scanning · pr-* PR
# automation · chore-* repo housekeeping):
#   ci-backend-db.yml            — template suite against a real Postgres
#   ci-e2e.yml                   — full-stack Playwright E2E
#   ci-compose-smoke.yml         — compose stack smoke test
#   ci-pre-commit.yml            — ruff/mypy/ty/biome hook parity
#   ci-coverage.yml              — coverage report (Smokeshow)
#   security-scan.yml            — gitleaks / pip-audit / osv-scanner (+ cron)
#   security-workflow-audit.yml  — zizmor GitHub Actions audit
#   security-guard-dependencies.yml — dependency-change review guard
#   cd-deploy-{staging,production}.yml — environment deploys

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
  workflow_dispatch:

permissions: {}

# One run per ref; superseded PR runs are cancelled (never cancel main).
concurrency:
  group: ci-pipeline-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ---------------------------------------------------------------- static
  backend-quality:
    name: Backend lint + types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.18"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-suffix: backend-quality
      - name: ruff lint
        run: uv run ruff check app tests_smartforge tests_dataplatform
        working-directory: backend
      - name: ruff format (drift check)
        run: uv run ruff format --check app tests_smartforge tests_dataplatform
        working-directory: backend
      - name: mypy strict (104 files)
        run: uv run mypy app
        working-directory: backend

  # ----------------------------------------------------------------- tests
  platform-suite:
    name: Data-platform suite (356 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.18"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-suffix: platform-suite
      - name: Pipeline lifecycle, lake, DuckDB, warehouse guards, API contracts,
              control totals, perf-regression lane
        run: uv run pytest tests_dataplatform -q --durations=10
        working-directory: backend

  app-suite:
    name: Application suite (122 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Offline stand-ins — the suite runs on in-memory SQLite with real
      # auth/RBAC dependencies; no service is contacted.
      POSTGRES_SERVER: localhost
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci-only
      POSTGRES_DB: ci
      FIRST_SUPERUSER: ci@futureform.com
      FIRST_SUPERUSER_PASSWORD: ci-only
      SECRET_KEY: ci-only-secret
      PROJECT_NAME: SmartForge
      SIMULATOR_ENABLED: "false"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.18"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-suffix: app-suite
      - name: Routers, RBAC + route-wiring sweep, rate limiting, redis helpers,
              runtime logging, services
        run: uv run pytest tests_smartforge -q --durations=10
        working-directory: backend

  frontend-suite:
    name: Frontend quality + unit (94 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies (frozen against the committed bun.lock —
              deterministic CI, no floating resolution)
        run: bun install --frozen-lockfile
      - name: Biome (lint drift check, no writes)
        run: bun x biome check --no-errors-on-unmatched --files-ignore-unknown=true ./src
        working-directory: frontend
      - name: TypeScript (route tree + strict build config)
        run: bun x tsc -p tsconfig.build.json --noEmit
        working-directory: frontend
      - name: Vitest (error paradigm, ApiError/request-id, badges, helpers)
        run: bun x vitest run
        working-directory: frontend

  # ---------------------------------------------------------- config gates
  dbt-validate:
    name: dbt dual-target parse + docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.18"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-suffix: dbt-validate
      - name: Parse (lake / DuckDB target)
        run: uv run dbt parse --project-dir ../dbt --profiles-dir ../dbt --target lake
        working-directory: backend
      - name: Parse (warehouse / PostgreSQL target)
        run: uv run dbt parse --project-dir ../dbt --profiles-dir ../dbt --target warehouse
        working-directory: backend
      - name: Docs + lineage artifacts (DBT-018)
        run: |
          mkdir -p /tmp/dbt-catalog
          DUCKDB_PATH=/tmp/dbt-catalog/ci.duckdb uv run dbt docs generate --project-dir ../dbt --profiles-dir ../dbt --target lake --empty-catalog
        working-directory: backend
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dbt-docs
          path: |
            dbt/target/index.html
            dbt/target/manifest.json
            dbt/target/catalog.json

  deploy-contracts:
    name: Compose, Helm & preflight contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.18"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-suffix: deploy-contracts
      - name: compose.yml interpolates cleanly against .env.example
        run: |
          cp .env.example .env
          docker compose -f compose.yml config --quiet
          rm .env
      - name: Helm chart renders for every environment
        run: |
          helm lint infra/helm/smartforge
          helm template infra/helm/smartforge > /dev/null
          helm template infra/helm/smartforge -f infra/helm/smartforge/values-staging.yaml > /dev/null
          helm template infra/helm/smartforge -f infra/helm/smartforge/values-production.yaml > /dev/null
      - name: Workflow YAML is parseable
        run: uv run python -c "import pathlib, yaml; [yaml.safe_load(p.read_text(encoding='utf-8')) for p in pathlib.Path('../.github/workflows').glob('*.yml')]; print('workflows ok')"
        working-directory: backend
      - name: Platform preflight (local gates; external services report-only)
        run: uv run python -m app.dataplatform.cli preflight --tolerate-unreachable
        working-directory: backend

  # ------------------------------------------------------------------ gate
  pipeline-confidence:
    name: Pipeline confidence gate
    # The single required status check: green only when EVERY gate above
    # is green. `always()` ensures it reports (as failed) even when a
    # dependency fails or is cancelled — a skipped gate is a failed gate.
    if: always()
    needs:
      - backend-quality
      - platform-suite
      - app-suite
      - frontend-suite
      - dbt-validate
      - deploy-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate gates
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "## SmartForge v1.0.0 — pipeline confidence" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gate | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          failed=0
          for job in $(echo "$RESULTS" | python3 -c "import json,sys; print(' '.join(json.load(sys.stdin).keys()))"); do
            result=$(echo "$RESULTS" | python3 -c "import json,sys; print(json.load(sys.stdin)['$job']['result'])")
            echo "| $job | $result |" >> "$GITHUB_STEP_SUMMARY"
            if [ "$result" != "success" ]; then failed=1; fi
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$failed" -eq 1 ]; then
            echo "❌ One or more gates failed — pipeline integrity NOT confirmed." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "✅ 572 offline-verifiable tests + all static/config gates green." >> "$GITHUB_STEP_SUMMARY"
